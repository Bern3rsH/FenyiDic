name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-mac:
    name: Build and publish macOS release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare local release notes
        run: node scripts/extract-release-notes.js --output "$RUNNER_TEMP/release-notes.md"

      - name: Check telemetry release configuration
        run: |
          if [ -n "$VITE_SENTRY_DSN" ]; then
            echo "Sentry telemetry: configured"
          else
            echo "Sentry telemetry: missing VITE_SENTRY_DSN"
          fi

          if [ -n "$VITE_POSTHOG_KEY" ]; then
            echo "PostHog telemetry: configured"
          else
            echo "PostHog telemetry: missing VITE_POSTHOG_KEY"
          fi

          echo "PostHog host: ${VITE_POSTHOG_HOST:-https://us.i.posthog.com}"
        env:
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN || secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY || secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST || secrets.VITE_POSTHOG_HOST }}

      - name: Publish macOS artifacts to GitHub Releases
        run: npm run release:mac
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN || secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY || secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST || secrets.VITE_POSTHOG_HOST || 'https://us.i.posthog.com' }}

      - name: Apply local release notes
        run: |
          RELEASE_TAG="v$(node -p "require('./package.json').version")"
          gh release edit "$RELEASE_TAG" --notes-file "$RUNNER_TEMP/release-notes.md"
        env:
          GH_TOKEN: ${{ github.token }}
